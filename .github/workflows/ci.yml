name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  lint:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true && github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev libudev-dev libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      # keep-agent-py and keep-agent-ts are excluded from the workspace (cdylib
      # bindings with their own lockfiles), so --workspace never sees them. Check
      # them explicitly to catch dependency drift that only surfaces on compile.
      - run: cargo fmt --manifest-path keep-agent-py/Cargo.toml -- --check
      - run: cargo clippy --manifest-path keep-agent-py/Cargo.toml -- -D warnings
      - run: cargo fmt --manifest-path keep-agent-ts/Cargo.toml -- --check
      - run: cargo clippy --manifest-path keep-agent-ts/Cargo.toml -- -D warnings

  build:
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft != true && github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev libudev-dev libgtk-3-dev libxdo-dev
      - name: Install Xcode tools (macOS)
        if: matrix.os == 'macos-latest'
        run: xcode-select --install || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo build --release
      - run: cargo test --workspace --lib --bins
      - run: cargo test -p keep-core --features testing --test integration_tests
      - run: cargo test -p keep-frost-net --features testing --test multinode_test
      - run: cargo test -p keep-enclave-host --test integration_tests

  build-windows:
    runs-on: windows-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-latest
      - run: cargo build --release
      - run: cargo test --workspace --lib --bins

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev libudev-dev libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --all-targets --features testing

  reproducible:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7
      - name: Build twice and compare
        run: |
          docker build -f Dockerfile.reproducible -o type=local,dest=./dist1 .
          docker build --no-cache -f Dockerfile.reproducible -o type=local,dest=./dist2 .
          HASH1=$(sha256sum dist1/keep | cut -d' ' -f1)
          HASH2=$(sha256sum dist2/keep | cut -d' ' -f1)
          echo "Build 1: $HASH1"
          echo "Build 2: $HASH2"
          if [ "$HASH1" != "$HASH2" ]; then
            echo "Reproducibility check failed"
            exit 1
          fi
          echo "Reproducible build verified"

  fuzz:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          # GitHub-hosted runners preload third-party apt repos (Microsoft, Google)
          # whose mirrors intermittently serve invalid InRelease files, which fails
          # `apt-get update`. None of them provide the packages below, so drop them.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* /etc/apt/sources.list.d/*google*
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libudev-dev libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - run: cargo +nightly install cargo-fuzz --locked
      - name: Fuzz nsec parsing
        run: cargo +nightly fuzz run fuzz_nsec -- -max_total_time=30
        working-directory: fuzz
      - name: Fuzz npub parsing
        run: cargo +nightly fuzz run fuzz_npub -- -max_total_time=30
        working-directory: fuzz
      - name: Fuzz vault header parsing
        run: cargo +nightly fuzz run fuzz_vault_header -- -max_total_time=30
        working-directory: fuzz
      - name: Fuzz FROST messages
        run: cargo +nightly fuzz run fuzz_frost_messages -- -max_total_time=30
        working-directory: fuzz
      - name: Fuzz encrypted data
        run: cargo +nightly fuzz run fuzz_encrypted_data -- -max_total_time=30
        working-directory: fuzz
      - name: Fuzz share export
        run: cargo +nightly fuzz run fuzz_share_export -- -max_total_time=30
        working-directory: fuzz
