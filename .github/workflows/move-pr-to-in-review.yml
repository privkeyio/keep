name: Move PR to In Review when reviewer is requested

on:
  pull_request:
    types: [review_requested]

permissions:
  pull-requests: write
  contents: read

jobs:
  move-to-review:
    if: ${{ secrets.UPDATE_PROJECT_V2_PAT && !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest

    steps:
      - name: Move PR to "In Review" column
        uses: nipe0324/update-project-v2-item-field@c4af58452d1c5a788c1ea4f20e073fa722ec4a6b # v2.0.2
        with:
          project-url: https://github.com/orgs/privkeyio/projects/6
          github-token: ${{ secrets.UPDATE_PROJECT_V2_PAT }}
          field-name: "Status"
          field-value: "In Review"
